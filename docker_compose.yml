# docker-compose.yml
# ============================================================
# One-command launch: docker compose up --build
# ============================================================

version: '3.9'

services:

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shelf_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models        # mount trained models
      - shelf_db:/app                       # persist SQLite DB
    environment:
      - MODEL_PATH=/app/models/best.pt
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: shelf_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    profiles: ["production"]   # only starts with: docker compose --profile production up

volumes:
  shelf_db: